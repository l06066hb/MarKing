name: Cross-Platform Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write 
    strategy:
      fail-fast: false
      matrix: 
        include:
          # Windows (x64)
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            target: x86_64-pc-windows-msvc
            arch_label: 'x64'
          # macOS Intel (x64) — 使用 macos-latest (ARM runner) 进行交叉编译，因为 Github Actions 逐渐下线/限制了旧版 macos-13 节点
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
            arch_label: 'x64'
          # macOS Apple Silicon (arm64) — 使用 macos-latest (ARM runner)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
            arch_label: 'aarch64'
          # Linux (x64)
          - platform: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu
            arch_label: 'x64'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Setup SSH For Gitee
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.GITEE_PRIVATE_KEY }}

      - name: Trust Gitee Host
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

      # 浅克隆 (--depth 1) 仅拉取当前版本，极大加速大仓库的拉取效率
      - name: Clone Gitee Private Repository
        run: git clone --depth 1 -b ${{ github.ref_name }} ${{ secrets.GITEE_REPO_SSH_URL }} .

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Rust and Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }} 

      # 性能优化：Rust 编译缓存，按 target 区分避免缓存冲突
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "marking-${{ matrix.target }}"

      # macOS: 仅保留当前架构的 pandoc，删除另一个以减小包体积
      - name: Prepare Pandoc sidecar (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          echo "Target: ${{ matrix.target }}"
          KEEP="src-tauri/binaries/pandoc-${{ matrix.target }}"
          echo "Keeping pandoc: $KEEP"
          # 删除非当前架构的 macOS pandoc 二进制
          for f in src-tauri/binaries/pandoc-*-apple-darwin; do
            if [ "$f" != "$KEEP" ]; then
              echo "Removing unused pandoc: $f"
              rm -f "$f"
            fi
          done
          chmod +x "$KEEP"
          ls -lh src-tauri/binaries/pandoc-*

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ 
          releaseName: 'MarKing v__VERSION__'
          releaseBody: |
            全平台客户端安装包已编译完成，请根据您的系统下载对应版本：

            **macOS**
            - Apple Silicon (M1/M2/M3/M4/M5)：下载 `aarch64.dmg`
            - Intel 芯片：下载 `x64.dmg`
            - ⚠️ 如果打开时提示「已损坏，无法打开」，请在终端执行：`xattr -cr /Applications/MarKing.app` 然后重新打开即可。

            **Windows**
            - 下载 `.exe` 安装包（支持 64 位系统）

            **Linux**
            - 下载 `.deb` 或 `.AppImage`（支持 x86_64）
          releaseDraft: true 
          prerelease: false
          args: ${{ matrix.args }}
