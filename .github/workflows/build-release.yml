name: Cross-Platform Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write 
    strategy:
      fail-fast: false
      matrix: 
        include:
          # Windows (x64)
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            target: x86_64-pc-windows-msvc
            arch_label: 'x64'
          # macOS Intel (x64) — 使用 macos-latest (ARM runner) 进行交叉编译，因为 Github Actions 逐渐下线/限制了旧版 macos-13 节点
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
            arch_label: 'x64'
          # macOS Apple Silicon (arm64) — 使用 macos-latest (ARM runner)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
            arch_label: 'aarch64'
          # Linux (x64)
          - platform: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu
            arch_label: 'x64'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Setup SSH For Gitee
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.GITEE_PRIVATE_KEY }}

      - name: Configure Git & SSH for cross-border large repo
        shell: bash
        run: |
          mkdir -p ~/.ssh
          # ssh-keyscan 偶发被 Gitee 限速/拒连导致非零退出，set -e 下会直接挂掉整步；
          # 这里允许失败，后续靠 StrictHostKeyChecking=accept-new 兜底首次连接自动信任。
          # stderr 故意不重定向，方便在 CI 日志里直接定位 ssh-keyscan 失败原因。
          echo "--- ssh-keyscan gitee.com ---"
          ssh-keyscan -T 10 gitee.com >> ~/.ssh/known_hosts || \
            echo "::warning::ssh-keyscan failed; relying on accept-new fallback"
          # git 传输 buffer 默认 1MB，对大 pack 必撑爆 → 1GB
          git config --global http.postBuffer 1048576000
          # 取消传输压缩：服务端 CPU 等待时间过长易触发中间设备断流
          git config --global core.compression 0
          # SSH KeepAlive：每 30s 心跳，防 idle timeout；
          # accept-new 在 known_hosts 缺失时首次连接自动信任并写回，后续仍校验。
          cat >> ~/.ssh/config << 'EOF'
          Host gitee.com
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config

      # 浅克隆 (--depth 1 --no-tags --single-branch) + 5 次重试 + 指数退避。
      # secret 通过 env 传递避免命令行展开（GitHub Actions 已自动 mask，env 是双保险）。
      - name: Clone Gitee Private Repository (with retry)
        shell: bash
        env:
          GITEE_URL: ${{ secrets.GITEE_REPO_SSH_URL }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set +e
          for attempt in 1 2 3 4 5; do
            echo "::group::Clone attempt $attempt"
            if git clone --depth 1 --no-tags --single-branch \
                -b "$REF_NAME" "$GITEE_URL" .; then
              echo "Clone succeeded on attempt $attempt"
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed, cleaning workspace..."
            shopt -s dotglob nullglob
            rm -rf ./* || true
            shopt -u dotglob nullglob
            # 指数退避：10s, 20s, 30s, 40s
            sleep $((attempt * 10))
          done
          # 不暴露 URL/repo 名，只指示运维方向
          echo "::error::All 5 clone attempts failed - check Gitee SSH key and network connectivity"
          exit 1

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Rust and Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }} 

      # 性能优化：Rust 编译缓存，按 target 区分避免缓存冲突
      # shared-key 后缀加 v2 强制使现有受污染缓存失效（首次 push 后可去掉）。
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "marking-${{ matrix.target }}-v2"
          cache-bin: false

      # macOS: 仅保留当前架构的 pandoc，删除另一个以减小包体积
      - name: Prepare Pandoc sidecar (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          echo "Target: ${{ matrix.target }}"
          KEEP="src-tauri/binaries/pandoc-${{ matrix.target }}"
          echo "Keeping pandoc: $KEEP"
          # 删除非当前架构的 macOS pandoc 二进制
          for f in src-tauri/binaries/pandoc-*-apple-darwin; do
            if [ "$f" != "$KEEP" ]; then
              echo "Removing unused pandoc: $f"
              rm -f "$f"
            fi
          done
          chmod +x "$KEEP"
          ls -lh src-tauri/binaries/pandoc-*

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
        with:
          tagName: v__VERSION__ 
          releaseName: 'MarKing v__VERSION__'
          releaseBody: |
            全平台客户端安装包已编译完成，请根据您的系统下载对应版本：

            **macOS**
            - Apple Silicon (M1/M2/M3/M4/M5)：下载 `aarch64.dmg`
            - Intel 芯片：下载 `x64.dmg`
            - ⚠️ 如果打开时提示「已损坏，无法打开」，请在终端执行：`xattr -cr /Applications/MarKing.app` 然后重新打开即可。

            **Windows**
            - 下载 `.exe` 安装包（支持 64 位系统）

            **Linux**
            - 下载 `.deb` 或 `.AppImage`（支持 x86_64）
          releaseDraft: true 
          prerelease: false
          args: ${{ matrix.args }}

      
      - name: Repackage AppImage with FUSE3 runtime (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          # 1. 定位 Tauri 生成的 AppImage
          APPIMAGE=$(find src-tauri/target target -name "*.AppImage" -type f 2>/dev/null | head -1 || true)
          if [ -z "$APPIMAGE" ]; then
            echo "::warning::No AppImage found, skipping FUSE3 repackage"
            echo "--- Debug: bundle dir contents ---"
            find src-tauri/target -type d -name "bundle" 2>/dev/null || true
            find target -type d -name "bundle" 2>/dev/null || true
            exit 0
          fi
          BASENAME=$(basename "$APPIMAGE")
          echo "Original AppImage: $APPIMAGE"

          # 2. 提取（--appimage-extract 不需要 FUSE，CI 环境安全）
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          # 3. 下载 appimagetool 和 type2-runtime（FUSE2/FUSE3 双兼容）
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          wget -q "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64" \
            -O runtime-fuse3
          chmod +x appimagetool runtime-fuse3

          # 4. 剔除 bundle 的动态库，强制走系统库
          # 与 deb / rpm 行为对齐，避免 bundle 库与目标系统 ABI 不一致引发的
          # 渲染异常。要求系统已装 libwebkit2gtk-4.1（Ubuntu 22.04+ 默认）。
          echo "Stripping bundled libraries to use system versions"
          LIB_DIR="squashfs-root/usr/lib"
          if [ -d "$LIB_DIR" ]; then
            BEFORE_COUNT=$(find "$LIB_DIR" -maxdepth 1 -name '*.so*' -type f 2>/dev/null | wc -l)
            BEFORE_SIZE=$(du -sh "$LIB_DIR" 2>/dev/null | cut -f1)
            rm -f "$LIB_DIR"/*.so*
            AFTER_SIZE=$(du -sh "$LIB_DIR" 2>/dev/null | cut -f1)
            echo "Removed $BEFORE_COUNT bundled libraries (size: $BEFORE_SIZE -> $AFTER_SIZE)"
          else
            echo "::warning::$LIB_DIR not found, skipping library strip"
          fi

          # 5. 注入 WebKitGTK 兼容启动器
          # 新版 WebKitGTK (Ubuntu 24.04+/Wayland/部分 GPU 驱动) 的 compositing
          # 与 DMABUF 渲染路径会导致 AppImage 卡在 loading 或界面无响应。
          # 用 wrapper 脚本替换默认 AppRun，启动前注入兼容开关，
          # 同时允许用户通过外部环境变量覆盖（值为 0 即可关闭）。
          APP_BIN=$(find squashfs-root/usr/bin -maxdepth 1 -type f -executable | head -1)
          if [ -n "$APP_BIN" ]; then
            BIN_NAME=$(basename "$APP_BIN")
            echo "Injecting WebKit-compat AppRun wrapper for: $BIN_NAME"
            rm -f squashfs-root/AppRun
            {
              echo '#!/bin/bash'
              echo 'HERE="$(dirname "$(readlink -f "${0}")")"'
              echo 'export WEBKIT_DISABLE_COMPOSITING_MODE="${WEBKIT_DISABLE_COMPOSITING_MODE:-1}"'
              echo 'export WEBKIT_DISABLE_DMABUF_RENDERER="${WEBKIT_DISABLE_DMABUF_RENDERER:-1}"'
              echo "exec \"\$HERE/usr/bin/${BIN_NAME}\" \"\$@\""
            } > squashfs-root/AppRun
            chmod +x squashfs-root/AppRun
            echo "--- AppRun content ---"
            cat squashfs-root/AppRun
          else
            echo "::warning::No executable found in usr/bin, keeping default AppRun"
          fi

          # 6. 用新 runtime 重新打包
          #    APPIMAGE_EXTRACT_AND_RUN=1 让 appimagetool 自身也无需 FUSE 即可运行
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool --runtime-file runtime-fuse3 squashfs-root "$BASENAME"
          echo "Repackaged with FUSE3-compatible runtime: $(ls -lh "$BASENAME" | awk '{print $5}')"

          # 7. 上传到 draft release（--clobber 替换 tauri-action 上传的 FUSE2 版本）
          RELEASE_TAG="v$(jq -r '.version' src-tauri/tauri.conf.json)"
          echo "Uploading to release: $RELEASE_TAG"
          gh release upload "$RELEASE_TAG" "$BASENAME" --clobber --repo "${{ github.repository }}"

          # 8. 清理
          rm -rf squashfs-root appimagetool
